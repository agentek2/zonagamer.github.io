<script>
const menuBtn = document.getElementById("menuBtn");
const navLinks = document.getElementById("navLinks");
const links = navLinks.querySelectorAll("a");

menuBtn.addEventListener("click", () =>{

  navLinks.classList.toggle("active");

  if(navLinks.classList.contains("active")){
    menuBtn.innerHTML = "✖";
    menuBtn.setAttribute("aria-expanded","true")
  }else{
    menuBtn.innerHTML = "☰";
    menuBtn.setAttribute("aria-expanded","false")
  }

});

links.forEach(link => {
  link.addEventListener("click",() => {
    navLinks.classList.remove("active");
    menuBtn.innerHTML = "☰";
    menuBtn.setAttribute("aria-expanded","false")
  })
});

</script>

<script>


const m=document.getElementById("matrix")
const mctx=m.getContext("2d")

function resizeM(){
m.width=window.innerWidth
m.height=window.innerHeight
initDrops()
}

window.addEventListener("resize",resizeM)

const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*"
let drops=[]

function initDrops(){
drops=Array(Math.floor(m.width/16)).fill(0)
}

resizeM()

function matrix(){

mctx.fillStyle="rgba(0,0,0,.1)"
mctx.fillRect(0,0,m.width,m.height)

mctx.font="16px monospace"

drops.forEach((y,i)=>{

mctx.fillStyle="#0f0"

mctx.fillText(chars[Math.random()*chars.length|0],i*16,y*16)

drops[i]=y*16>m.height&&Math.random()>.975?0:y+1

})

requestAnimationFrame(matrix)

}

matrix()



const r=document.getElementById("roulette")
const ctx=r.getContext("2d")

let angle=0
let speed=0.002
let extraSpeed=0
let friction=0.985

let forceSpin=false
let paused=false
let waitTimer=null

function resizeR(){

const rect=r.getBoundingClientRect()

const size=Math.min(rect.width,rect.height)

r.width=size
r.height=size

}

window.addEventListener("resize",resizeR)

resizeR()

function opts(){

return [...document.querySelectorAll("#options input")]

.map(i=>i.value.trim()||i.placeholder.trim())

.filter(Boolean)

}



function drawText(text,rad){

let words=text.split(" ")

let lines=[]

let line=""

ctx.font=rad*.09+"px monospace"

let maxWidth=rad*.7

for(let n=0;n<words.length;n++){

let test=line+words[n]+" "

let w=ctx.measureText(test).width

if(w>maxWidth && n>0){

lines.push(line)

line=words[n]+" "

}else{

line=test

}

}

lines.push(line)

lines.forEach((l,i)=>{

ctx.fillText(l.trim(),rad*.55,(i*rad*.09))

})

}

function draw(){

const o=opts()

const rad=r.width/2

ctx.clearRect(0,0,r.width,r.height)

if(!paused){

angle+=speed+extraSpeed

extraSpeed*=friction

}

if(extraSpeed<0.0001 && forceSpin){

forceSpin=false

pauseOnWinner()

}

ctx.save()

ctx.translate(rad,rad)

ctx.rotate(angle)

const slice=Math.PI*2/o.length

o.forEach((t,i)=>{

ctx.beginPath()

ctx.moveTo(0,0)

ctx.arc(0,0,rad*.9,i*slice,(i+1)*slice)

ctx.closePath()

ctx.fillStyle=`hsl(${i*360/o.length},100%,50%)`

ctx.fill()

ctx.strokeStyle="#00ff66"

ctx.lineWidth=rad*.015

ctx.stroke()

ctx.save()

ctx.rotate(i*slice+slice/2)

ctx.fillStyle="#000"

ctx.textAlign="center"

drawText(t,rad)

ctx.restore()

})

ctx.restore()

requestAnimationFrame(draw)

}

draw()



const btn=document.getElementById("spinBtn")

const fill=document.getElementById("powerFill")

const spinSound=document.getElementById("spinSound")

const endSound=document.getElementById("endSound")

let power=0

let intv=null

let cargando=false

let bloqueado=false

function iniciarFuerza(){

if(bloqueado)return

clearTimeout(waitTimer)

paused=false

power=0

cargando=true

clearInterval(intv)

intv=setInterval(()=>{

if(power<100&&cargando){

power++

fill.style.width=power+"%"

}

},20)

}

function soltarFuerza(){

if(!cargando||bloqueado)return

cargando=false

bloqueado=true

btn.disabled=true

clearInterval(intv)

fill.style.width="0%"

extraSpeed=0.25*(power/100)

forceSpin=true

spinSound.currentTime=0

spinSound.play()

const desbloquear=setInterval(()=>{

if(!forceSpin&&extraSpeed<0.0001){

bloqueado=false

btn.disabled=false

clearInterval(desbloquear)

}

},100)

}

btn.addEventListener("mousedown",e=>{e.preventDefault();iniciarFuerza()})

document.addEventListener("mouseup",soltarFuerza)

btn.addEventListener("touchstart",e=>{e.preventDefault();iniciarFuerza()},{passive:false})

document.addEventListener("touchend",e=>{e.preventDefault();soltarFuerza()},{passive:false})



function winner(){

const o=opts()

const slice=Math.PI*2/o.length

const n=(angle%(Math.PI*2)+Math.PI*2)%(Math.PI*2)

const p=(3*Math.PI/2-n+Math.PI*2)%(Math.PI*2)

return o[Math.floor(p/slice)]

}

function pauseOnWinner(){

paused=true

endSound.play()

winnerText.textContent="Resultado: "+winner()

popup.style.display="flex"

crack.style.display="block"

waitTimer=setTimeout(()=>{

closePopup()

},60000)

}

function closePopup(){

popup.style.display="none"

crack.style.display="none"

}

const continueBtn=document.getElementById("continueBtn")

continueBtn.addEventListener("click",closePopup)

continueBtn.addEventListener("touchstart",closePopup)

</script>
